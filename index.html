<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲行动小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            color: #fff;
        }
        body {
            background-color: #121212;
            padding: 10px;
        }
        /* 顶部标题栏 */
        .top-bar {
            text-align: center;
            font-size: 20px;
            margin-bottom: 15px;
            position: relative;
        }
        .top-bar .right-btn {
            position: absolute;
            right: 0;
            top: 0;
            background-color: #222;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        /* 烽火日报区域 */
        .fire-report {
            background: linear-gradient(to bottom, #1a2a40, #0d1825);
            border: 1px solid #0f3;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .report-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .report-tab {
            padding: 5px 10px;
            background-color: #0f3;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
        }
        .report-tab.active {
            background-color: #092;
        }
        .subscribe-btn {
            float: right;
            background-color: #0f3;
            color: #000;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        /* 今日密码区域 */
        .password-area {
            margin-bottom: 10px;
        }
        .password-title {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .map-codes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .map-code {
            background-color: #222;
            padding: 8px;
            border: 1px solid #0f3;
            text-align: center;
            min-width: 80px;
        }
        .map-code .map-name {
            font-size: 12px;
            margin-bottom: 3px;
        }
        .map-code .code {
            font-size: 16px;
            color: #f33;
            font-weight: bold;
        }
        /* 昨日收益区域 */
        .awards-area {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .award-item {
            background-color: #222;
            padding: 8px;
            border: 1px solid #0f3;
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        .award-item img {
            width: 30px;
            height: 30px;
            margin-bottom: 5px;
            object-fit: contain;
        }
        .award-item .count {
            font-size: 12px;
            color: #aaa;
        }
        .award-item .name {
            font-size: 12px;
        }
        .profit-box {
            background-color: #222;
            border: 1px solid #f33;
            padding: 8px;
            text-align: center;
            min-width: 120px;
        }
        .profit-box .profit {
            font-size: 14px;
            color: #f33;
            font-weight: bold;
        }
        .profit-box .date {
            font-size: 10px;
            color: #aaa;
        }
        /* 按钮区域 */
        .report-btns {
            display: flex;
            gap: 10px;
        }
        .report-btn {
            flex: 1;
            padding: 8px;
            background-color: #222;
            border: 1px solid #0f3;
            text-align: center;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .report-btn.green {
            background-color: #0f3;
            color: #000;
            font-weight: bold;
        }
        /* 功能按钮区域 */
        .func-btns {
            display: flex;
            justify-content: space-around;
            background-color: #1a2a40;
            border: 1px solid #0f3;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .func-btn {
            text-align: center;
            cursor: pointer;
        }
        .func-btn img {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 5px;
            object-fit: contain;
        }
        .func-btn .name {
            font-size: 12px;
        }
        /* 特勤处制造区域 */
        .manufacture-area {
            background: linear-gradient(to bottom, #1a2a40, #0d1825);
            border: 1px solid #0f3;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }
        .manufacture-title {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .manufacture-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
        .manufacture-tab {
            padding: 4px 8px;
            background-color: #0f3;
            color: #000;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .more-btn {
            margin-left: auto;
            font-size: 12px;
            color: #0f3;
            cursor: pointer;
        }
        /* 制造项目区域 */
        .manufacture-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .manufacture-item {
            background-color: #222;
            border: 1px solid #0f3;
            padding: 8px;
            text-align: center;
            width: calc(25% - 8px);
            min-width: 120px;
        }
        .manufacture-item img {
            width: 40px;
            height: 40px;
            margin-bottom: 5px;
            object-fit: contain;
        }
        .manufacture-item .map-name {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 3px;
        }
        .manufacture-item .name {
            font-size: 12px;
            margin-bottom: 3px;
        }
        .manufacture-item .time {
            font-size: 10px;
            color: #aaa;
        }
        /* 最新热点区域 */

            margin-bottom: 8px;

            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
